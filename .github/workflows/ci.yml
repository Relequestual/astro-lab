name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o astlab ./cmd/astlab/

      - name: Test
        run: go test ./...

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: astlab-linux-amd64
          path: astlab
