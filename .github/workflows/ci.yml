name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    # Disabled while the repo is private. Remove this line to enable CI.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

  build:
    # Disabled while the repo is private. Remove this line to enable CI.
    if: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: astlab-linux-amd64
            binary: astlab
          - goos: windows
            goarch: amd64
            artifact: astlab-windows-amd64
            binary: astlab.exe
          - goos: darwin
            goarch: amd64
            artifact: astlab-darwin-amd64
            binary: astlab
          - goos: darwin
            goarch: arm64
            artifact: astlab-darwin-arm64
            binary: astlab
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.binary }} ./cmd/astlab/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
